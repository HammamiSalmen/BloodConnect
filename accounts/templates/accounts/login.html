{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | BloodConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="glass-panel p-5 glass-form-container" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold mb-1">Bon retour</h2>
        <p class="opacity-75">Connectez-vous à votre compte</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" placeholder="Votre identifiant" required>
        </div>
        <div class="mb-4">
            <label>Mot de passe</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-glass-primary w-100">Se connecter</button>
    </form>

    <div class="text-center mt-4 opacity-75" style="font-size: 0.9rem;">
        Pas encore de compte ? <br>
        <a href="{% url 'register_donneur' %}" class="text-danger text-decoration-none mt-2 d-inline-block">S'inscrire comme Donneur</a> <span class="mx-2">|</span> 
        <a href="{% url 'register_hopital' %}" class="text-primary text-decoration-none">S'inscrire comme Hôpital</a>
    </div>
</div>

</body>
</html>
