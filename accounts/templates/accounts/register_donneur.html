{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Donneur | BloodConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="glass-panel p-5 glass-form-container" style="width: 100%; max-width: 450px;">
    <div class="text-center mb-4">
        <div class="display-6 mb-2">🩸</div>
        <h3 class="fw-bold mb-1">Devenir Donneur</h3>
        <p class="opacity-75">Rejoignez la communauté des héros</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-glass-primary w-100 mt-3">Créer mon profil</button>
    </form>

    <div class="text-center mt-4 opacity-75">
        Déjà un compte ? <a href="{% url 'login' %}" class="text-danger text-decoration-none fw-bold">Se connecter</a>
    </div>
</div>

</body>
</html>
