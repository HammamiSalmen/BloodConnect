{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Hôpital | BloodConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="glass-panel p-5 glass-form-container" style="width: 100%; max-width: 450px; border-top: 4px solid #2563eb;">
    <div class="text-center mb-4">
        <div class="display-6 mb-2">🏥</div>
        <h3 class="fw-bold mb-1">Espace Hôpital</h3>
        <p class="opacity-75">Gérez vos demandes urgentes</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-glass-primary w-100 mt-3" style="background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);">
            Inscrire l'établissement
        </button>
    </form>

    <div class="text-center mt-4 opacity-75">
        Déjà inscrit ? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">Se connecter</a>
    </div>
</div>

</body>
</html>
